name: Update labels on issues with OP response

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  label-op-response:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check if the comment is from the OP
        id: check-op
        run: |
          OP=${GITHUB_EVENT_ISSUE_USER_LOGIN}
          COMMENTER=${GITHUB_EVENT_COMMENT_USER_LOGIN}
          if [ "$OP" = "$COMMENTER" ]; then
            echo "op_comment=true" >> $GITHUB_ENV
          else
            echo "op_comment=false" >> $GITHUB_ENV
          fi
        env:
          GITHUB_EVENT_ISSUE_USER_LOGIN: ${{ github.event.issue.user.login }}
          GITHUB_EVENT_COMMENT_USER_LOGIN: ${{ github.event.comment.user.login }}
      - name: Add 'Needs Attention' label if OP responded
        if: env.op_comment == 'true'
        run: gh issue edit "$ISSUE_URL" --add-label "Needs Attention"
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
      - name: Remove 'blocked customer response' label if OP responded
        if: env.op_comment == 'true'
        run: 'gh issue edit "$ISSUE_URL" --remove-label "blocked: customer response"'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
  label-new-issue:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add 'Needs Attention' label to new issue
        run: gh issue edit "$ISSUE_URL" --add-label "Needs Attention"
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
