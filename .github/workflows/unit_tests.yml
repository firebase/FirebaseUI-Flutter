name: unit_tests

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  detect_changed_packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changed_packages }}
      has_changes: ${{ steps.filter.outputs.changed_packages != '[]' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/changes
        id: filter

  unit_tests:
    name: "Run unit tests"
    runs-on: ubuntu-latest
    needs: detect_changed_packages
    if: needs.detect_changed_packages.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect_changed_packages.outputs.packages) }}
        target: ["html", "io"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: "stable"
          cache: true
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3
        with:
          melos-version: "^7.5.0"

      - name: Run unit tests on Chrome
        if: matrix.target == 'html'
        run: |
          melos exec \
            --scope=${MATRIX_PACKAGE}* \
            --dir-exists="test" \
            --fail-fast -- "flutter test --platform chrome"
        env:
          MATRIX_PACKAGE: ${{ matrix.package }}

      - name: Run unit tests
        if: matrix.target == 'io'
        run: |
          melos exec \
            --scope=${MATRIX_PACKAGE}* \
            --dir-exists="test" \
            --fail-fast -- "flutter test"
        env:
          MATRIX_PACKAGE: ${{ matrix.package }}
