name: tests
description: Testing project for firebase_ui
publish_to: "none"
version: 1.0.0+1

resolution: workspace

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_ui_auth: ^3.1.0
  firebase_ui_localizations: ^2.1.0
  firebase_ui_oauth_apple: ^2.1.0
  firebase_ui_oauth_facebook: ^2.1.0
  firebase_ui_oauth_google: ^2.1.0
  firebase_ui_oauth: ^2.1.0
  flutter_facebook_auth: ^7.1.2
  twitter_login: ^4.4.2
  firebase_ui_oauth_twitter: ^2.1.0
  cloud_firestore: ^6.6.0
  firebase_ui_firestore: ^2.1.0
  http: ^1.1.2
  google_sign_in: ^6.2.1
  firebase_ui_shared: ^1.5.0
  firebase_database: ^12.4.4
  firebase_ui_database: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  config:
    enable-swift-package-manager: false
